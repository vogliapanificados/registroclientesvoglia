<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voglia — Registro de Cliente</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Nunito+Sans:wght@400;600;700&display=swap');

:root{
  --r:#CC1F1F;--rd:#A81818;--a:#1D3A6B;--ad:#122649;
  --bg:#EFF1F8;--borde:#DDE1ED;--sombra:0 2px 14px rgba(29,58,107,.09);
  --muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:#1a1a2e;min-height:100vh}

.hdr{background:var(--r);position:relative;overflow:hidden;padding-bottom:50px}
.hdr::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none}
.hdr-in{display:flex;align-items:center;gap:14px;padding:18px 18px 10px;position:relative;z-index:1}
.logo-wrap{background:white;border-radius:50%;width:68px;height:68px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 18px rgba(0,0,0,.22);overflow:hidden}
.logo-wrap img{width:52px;height:52px;object-fit:contain}
.hdr-txt h1{font-family:'Nunito',sans-serif;color:white;font-size:21px;font-weight:900;line-height:1.15}
.hdr-txt p{color:rgba(255,255,255,.75);font-size:12px;margin-top:3px;font-weight:600}
.hdr-wave{position:absolute;bottom:-1px;left:0;width:100%;height:50px}

.body{padding:0 0 80px}
.slbl{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;letter-spacing:.09em;color:var(--a);text-transform:uppercase;padding:20px 18px 10px;display:block}
.card{margin:0 16px;background:white;border-radius:18px;padding:18px;border:1.5px solid var(--borde);box-shadow:var(--sombra)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld{margin-bottom:12px}.fld:last-child{margin-bottom:0}
.fld label{display:block;font-size:11px;font-weight:800;color:var(--a);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;padding:10px 13px;border:1.5px solid var(--borde);border-radius:10px;font-size:14px;color:#1a1a2e;background:#FAFBFC;font-family:'Nunito Sans',sans-serif;transition:border .18s,box-shadow .18s;outline:none;appearance:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--r);box-shadow:0 0 0 3px rgba(204,31,31,.10);background:white}
.fld textarea{resize:vertical;min-height:54px}
.fld .hint{font-size:11px;color:var(--muted);margin-top:4px}

.confirm{display:none;margin:16px 16px 0;border-radius:18px;padding:24px 20px;text-align:center;box-shadow:var(--sombra)}
.conf-ok{background:#DCFCE7;border:2px solid #4ADE80}
.conf-err{background:#FEE2E2;border:2px solid #F87171}
.conf-ico{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.conf-ok .conf-ico{background:#4ADE80}.conf-err .conf-ico{background:#F87171}
.conf-ico svg{width:30px;height:30px}
.conf-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;margin-bottom:8px}
.conf-ok .conf-title{color:#14532D}.conf-err .conf-title{color:#7F1D1D}
.conf-msg{font-size:13px;line-height:1.6;margin-bottom:12px}
.conf-ok .conf-msg{color:#166534}.conf-err .conf-msg{color:#991B1B}
.conf-pill{display:inline-block;border-radius:20px;font-size:13px;font-weight:800;padding:5px 18px;font-family:'Nunito',sans-serif}
.pill-ok{background:#DCFCE7;color:#14532D;border:1.5px solid #4ADE80}
.pill-err{background:#FEE2E2;color:#7F1D1D;border:1.5px solid #F87171}

.send-wrap{margin:16px 16px 0}
.btn-send{width:100%;background:var(--r);color:white;border:none;border-radius:16px;padding:17px 24px;font-size:17px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 4px 18px rgba(204,31,31,.35);transition:all .2s}
.btn-send:hover{background:var(--rd);transform:translateY(-1px)}
.btn-send:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-send svg{width:21px;height:21px;flex-shrink:0}

.footer{background:var(--a);position:relative;margin-top:30px;padding:20px 16px 18px}
.footer-wave{position:absolute;top:-1px;left:0;width:100%;height:36px}
.footer-in{display:flex;align-items:center;justify-content:center;gap:12px;padding-top:12px;flex-wrap:wrap}
.footer-logo{color:white;font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;font-style:italic}
.fsep{color:rgba(255,255,255,.25)}.ftag{color:rgba(255,255,255,.55);font-size:12px;font-weight:600}

@media(max-width:400px){.g2{grid-template-columns:1fr}}
</style>
</head>

<div class="body">

  <span class="slbl">Contacto y entrega</span>

    <div class="fld">
      <label>Email</label>

    </div>
    <div class="fld">
      <label>Teléfono</label>
      <input type="text" id="telefono" placeholder="+54 11 ..." autocomplete="off"/>
    </div>
    <div class="fld">
      <label>Dirección de entrega</label>
      <input type="text" id="direccion" placeholder="Calle y número" autocomplete="off"/>
    </div>
    <div class="g2">
      <div class="fld">
        <label>Localidad</label>
        <input type="text" id="localidad" placeholder="Ej: Lomas de Zamora" autocomplete="off"/>
      </div>
      <div class="fld">
        <label>Provincia</label>
        <input type="text" id="provincia" placeholder="Ej: Buenos Aires" autocomplete="off"/>
      </div>
    </div>
    <div class="fld">
      <label>Rango horario de entrega</label>
      <select id="horario">
        <option value="">Seleccioná un horario</option>
        <option value="Mañana (06:00 - 12:00)">Mañana (06:00 - 12:00 hs)</option>
        <option value="Tarde (12:00 - 18:00)">Tarde (12:00 - 18:00 hs)</option>
        <option value="Todo el día (06:00 - 18:00)">Todo el día (06:00 - 18:00 hs)</option>

<script>
const SCRIPT_URL = 'TU_URL_DE_APPS_SCRIPT_AQUI';

function mostrarConfirm(tipo, titulo, msg, pill) {
  const el = document.getElementById('confirm');
  el.className = 'confirm conf-' + tipo;
  el.style.display = 'block';
  const iconos = {
    ok: '<polyline points="20 6 9 17 4 12"/>',
    err: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'
  };
  document.getElementById('conf-ico-svg').innerHTML = iconos[tipo];
  document.getElementById('conf-title').textContent = titulo;
  document.getElementById('conf-msg').textContent = msg;
  const pe = document.getElementById('conf-pill');
  pe.textContent = pill;
  pe.className = 'conf-pill pill-' + tipo;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function registrar() {
  const nombre      = document.getElementById('nombre').value.trim();
  const apellido    = document.getElementById('apellido').value.trim();
  const razon       = document.getElementById('razon_social').value.trim();
  const dni         = document.getElementById('dni').value.trim();
  const email       = document.getElementById('email').value.trim();
  const telefono    = document.getElementById('telefono').value.trim();
  const direccion   = document.getElementById('direccion').value.trim();
  const horario     = document.getElementById('horario').value;
  const notas       = document.getElementById('notas').value.trim();

  if (!nombre)    { alert('Ingresá tu nombre.');              return; }
  if (!apellido)  { alert('Ingresá tu apellido.');            return; }
  if (!dni)       { alert('Ingresá tu DNI.');                 return; }
  if (!email)     { alert('Ingresá tu email.');               return; }
  if (!telefono)  { alert('Ingresá tu teléfono.');            return; }
  const localidad  = document.getElementById('localidad').value.trim();
  const provincia  = document.getElementById('provincia').value.trim();
  if (!direccion) { alert('Ingresá tu dirección de entrega.'); return; }
  if (!localidad)  { alert('Ingresá tu localidad.');           return; }
  if (!provincia)  { alert('Ingresá tu provincia.');           return; }
  if (!horario)   { alert('Seleccioná un rango horario.');    return; }

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10" stroke-dasharray="40" stroke-dashoffset="10"/></svg> Registrando...`;

  const payload = {
    accion: 'registro',
    nombre, apellido, razon_social: razon, dni,
    email, telefono, direccion, localidad, provincia, horario, notas,
    fecha: new Date().toLocaleString('es-AR')
  };

  try {
    const respuesta = await new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now();
      const script = document.createElement('script');
      const timer = setTimeout(() => {
        delete window[cbName];
        document.body.removeChild(script);
        reject(new Error('timeout'));
      }, 12000);
      window[cbName] = function(data) {
        clearTimeout(timer);
        delete window[cbName];
        document.body.removeChild(script);
        resolve(data);
      };
      const params = new URLSearchParams({ data: JSON.stringify(payload), callback: cbName });
      script.src = SCRIPT_URL + '?' + params.toString();
      script.onerror = () => {
        clearTimeout(timer);
        delete window[cbName];
        document.body.removeChild(script);
        reject(new Error('network'));
      };
      document.body.appendChild(script);
    });

    if (respuesta && respuesta.status === 'ok') {
      mostrarConfirm('ok',
        '¡Registro exitoso!',
        'Tus datos fueron registrados correctamente. En breve un representante de Voglia se pondrá en contacto para confirmar tu cuenta.',
        '✓ Cliente registrado');
      ['nombre','apellido','razon_social','dni','email','telefono','direccion','localidad','provincia','notas'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('horario').value = '';
    } else if (respuesta && respuesta.status === 'already_exists') {
      mostrarConfirm('err',
        'El email ya está registrado',
        'Ya existe un cliente registrado con ese email. Si necesitás actualizar tus datos, comunicate con nosotros directamente.',
        '✗ Email duplicado');
    } else {
      mostrarConfirm('err',
        'Error al registrar',
        'Hubo un problema al guardar tus datos. Por favor intentá nuevamente.',
        '✗ Error');
    }
  } catch(e) {
    mostrarConfirm('err',
      'No se pudo conectar',
      'Verificá tu conexión a internet e intentá nuevamente.',
      '✗ Sin conexión');
  }

  btn.disabled = false;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Registrar cliente`;
}
</script>
</body>
</html>
